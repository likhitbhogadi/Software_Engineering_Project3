version: '3.8'

services:

  # ── MongoDB ──────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: mediflow-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - mediflow-net

  # ── Auth Service ─────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: mediflow-auth
    restart: unless-stopped
    ports:
      - '5001:5001'
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/auth_db
      JWT_SECRET: ${JWT_SECRET:-mediflow_dev_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongo
    networks:
      - mediflow-net

  # ── Sync Service ─────────────────────────────────────────────
  sync-service:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: mediflow-sync
    restart: unless-stopped
    ports:
      - '5002:5002'
    environment:
      PORT: 5002
      MONGO_URI: mongodb://mongo:27017/sync_db
      JWT_SECRET: ${JWT_SECRET:-mediflow_dev_secret_change_in_production}
      WRITE_SERVICE_URL: http://write-service:5003
    depends_on:
      - mongo
      - write-service
    networks:
      - mediflow-net

  # ── Write Service ────────────────────────────────────────────
  write-service:
    build:
      context: ./write-service
      dockerfile: Dockerfile
    container_name: mediflow-write
    restart: unless-stopped
    ports:
      - '5003:5003'
    environment:
      PORT: 5003
      MONGO_URI: mongodb://mongo:27017/patient_write_db
      JWT_SECRET: ${JWT_SECRET:-mediflow_dev_secret_change_in_production}
    depends_on:
      - mongo
    networks:
      - mediflow-net

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mediflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - mediflow-net

  # ── Read Service ─────────────────────────────────────────────
  # NOTE: In Docker mode (separate containers), the in-memory EventBus
  # cannot cross process boundaries. Use the root launcher (index.js)
  # for in-process EventBus. For Docker, upgrade to Kafka (see README).
  read-service:
    build:
      context: ./read-service
      dockerfile: Dockerfile
    container_name: mediflow-read
    restart: unless-stopped
    ports:
      - '5004:5004'
    environment:
      PORT: 5004
      MONGO_URI: mongodb://mongo:27017/patient_read_db
      JWT_SECRET: ${JWT_SECRET:-mediflow_dev_secret_change_in_production}
      REDIS_URI: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - mediflow-net

volumes:
  mongo_data:

networks:
  mediflow-net:
    driver: bridge
